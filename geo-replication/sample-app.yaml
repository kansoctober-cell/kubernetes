apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-app
  namespace: geo-frankfurt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insurance-app
  template:
    metadata:
      labels:
        app: insurance-app
    spec:
      containers:
      - name: app
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://insurance_user:$(cat /secrets/password)@insurance-db-primary-pgbouncer.geo-frankfurt.svc.cluster.local:5432/insurance_db"
        volumeMounts:
        - name: db-secret
          mountPath: /secrets
          readOnly: true
        command: ["python", "-c"]
        args:
        - |
          import os
          import psycopg2
          from flask import Flask

          app = Flask(__name__)

          @app.route('/')
          def hello():
              try:
                  conn = psycopg2.connect(os.environ['DATABASE_URL'])
                  cur = conn.cursor()
                  cur.execute("SELECT version();")
                  version = cur.fetchone()
                  cur.close()
                  conn.close()
                  return f"Connected to PostgreSQL: {version[0]}"
              except Exception as e:
                  return f"Error: {str(e)}"

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=5000)
      volumes:
      - name: db-secret
        secret:
          secretName: insurance-db-primary-pguser-insurance-user
---
apiVersion: v1
kind: Service
metadata:
  name: insurance-app-service
  namespace: geo-frankfurt
spec:
  selector:
    app: insurance-app
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP