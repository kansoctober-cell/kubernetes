apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: geo-frankfurt
data:
  backup-policy: |
    # Backup Policy for Insurance Database
    # - Full backups: Daily at 02:00
    # - Incremental backups: Every 6 hours
    # - Retention: 30 days for full, 7 days for incremental
    # - Encryption: AES-256
    # - Offsite storage: S3 bucket in Frankfurt region
    # - GDPR compliance: Automated deletion after retention period

  restore-procedure: |
    # Disaster Recovery Procedure
    1. Identify the backup point (RPO: 1 hour, RTO: 4 hours)
    2. Restore from pgBackRest backup
    3. Verify data integrity
    4. Update DNS to point to restored instance
    5. Notify stakeholders

  compliance-checks: |
    - Data encryption at rest: Enabled
    - Data encryption in transit: TLS 1.3
    - Access logging: Enabled
    - Audit trails: Enabled
    - Data residency: Germany only
    - GDPR compliance: Annual audits